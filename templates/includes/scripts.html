{% load static %}

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{% static 'js/main.js' %}"></script>

<!-- Page specific scripts -->
{% if request.resolver_match.url_name == 'dashboard_home' or request.resolver_match.url_name|slice:":8" == 'dashboard' %}
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="{% static 'js/dashboard.js' %}"></script>
{% endif %}

<!-- Form validation: handled in static/js/main.js (single listener avoids double handling) -->

<!-- Google Analytics (add your tracking ID) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-XXXXX-Y"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'UA-XXXXX-Y');
</script>

<!-- Live Chat Widget (optional) -->
<script>
// Add your live chat script here
</script>

<!-- WhatsApp Click to Chat -->
<script>
function openWhatsApp(phone, message) {
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
    window.open(url, '_blank');
}
</script>

<!-- Print functionality -->
<script>
function printPage() {
    window.print();
}
</script>

<!-- Copy to clipboard -->
<script>
function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(function() {
        alert('Copied to clipboard!');
    }, function() {
        alert('Failed to copy');
    });
}
</script>
